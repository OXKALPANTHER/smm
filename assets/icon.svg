<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Royal SMM">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6c5ce7"/>
      <stop offset="1" stop-color="#4834d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.18" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- full-bleed background so the icon is maskable-safe -->
  <rect width="512" height="512" fill="url(#g)"/>
  <rect width="512" height="512" fill="url(#glow)"/>
  <!-- monogram kept within the central safe zone -->
  <text x="50%" y="50%" dy=".07em" text-anchor="middle" dominant-baseline="middle"
        font-family="Poppins, 'Segoe UI', Arial, sans-serif" font-weight="800"
        font-size="300" fill="#ffffff">R</text>
</svg>
