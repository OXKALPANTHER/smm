<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal SMM — Hauko Mtandaoni</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --primary:#6c5ce7; --primary-2:#4834d4; --ink:#2b3674; --muted:#8a93b2; }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;
    font-family:'Poppins',sans-serif;color:var(--ink);
    background:radial-gradient(1000px 500px at 100% -10%,#e8ecff 0,transparent 60%),
               radial-gradient(800px 450px at -10% 10%,#e6fbfa 0,transparent 55%),#eef1fb;
    text-align:center;
  }
  .box{max-width:380px;}
  .ic{
    width:96px;height:96px;margin:0 auto 1.4rem;border-radius:28px;color:#fff;font-size:3rem;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--primary),var(--primary-2));
    box-shadow:0 18px 40px rgba(72,52,212,.35);
  }
  h1{font-size:1.4rem;font-weight:800;margin:0 0 .5rem;}
  p{color:var(--muted);font-size:.92rem;line-height:1.5;margin:0 0 1.6rem;}
  button{
    border:none;cursor:pointer;padding:.85rem 1.6rem;border-radius:16px;font-family:inherit;
    font-weight:700;font-size:.95rem;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-2));
    box-shadow:0 12px 26px rgba(72,52,212,.32);transition:transform .2s;
  }
  button:active{transform:scale(.96);}
</style>
</head>
<body>
  <div class="box">
    <div class="ic">📡</div>
    <h1>Hauko Mtandaoni</h1>
    <p>Inaonekana huna intaneti kwa sasa. Hakikisha umeunganishwa kisha jaribu tena.</p>
    <button onclick="location.reload()">Jaribu Tena</button>
  </div>
</body>
</html>
