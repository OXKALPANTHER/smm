<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6c5ce7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Royal SMM</title>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; background: #6c5ce7; }
    body { font-family: Arial, sans-serif; }
    #splash { position: fixed; inset: 0; background: linear-gradient(135deg,#6c5ce7,#4834d4); color: white; display: grid; place-items: center; z-index: 20; transition: opacity .35s ease; }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .logo { width: 84px; height: 84px; border-radius: 24px; background: rgba(255,255,255,.18); display: grid; place-items: center; font-size: 34px; font-weight: 700; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div id="splash">
    <div style="text-align:center;">
      <div class="logo">R</div>
      <div style="font-size:1.1rem;font-weight:700;">Royal SMM</div>
      <div style="font-size:.9rem;opacity:.9;margin-top:6px;">Loading your app...</div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
